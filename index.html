<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   フォーマッタ / ユーティリティ
   ============================================================ */
const yen = (n) => '¥' + Math.round(n || 0).toLocaleString('ja-JP');
const man = (n) => {
  if (!isFinite(n)) return '—';
  const m = (n || 0) / 10000;                       // 万円
  if (Math.abs(m) >= 10000) return (m / 10000).toFixed(2) + '億円'; // 1億＝10,000万
  return (Math.round(m * 10) / 10).toLocaleString('ja-JP') + '万円';
};
const pct = (n) => (isFinite(n) ? (n * 100).toFixed(1) + '%' : '—');
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
const ym = (dateStr) => (dateStr || '').slice(0, 7); // YYYY-MM

// 数字がカウントアップしていくアニメ（積み上げカウンター用）
// マウントのたびに 0 から目標へパラパラ動く（ホームに戻るたび再生）
function useCountUp(target, dur = 1300) {
  const [v, setV] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const from = prev.current, to = target;
    prev.current = to;
    if (from === to) { setV(to); return; }
    let raf, start;
    const tick = (t) => {
      if (start == null) start = t;
      const p = Math.min(1, (t - start) / dur);
      setV(from + (to - from) * (1 - Math.pow(1 - p, 3)));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}

/* ============================================================
   領収書画像ストア（IndexedDB） — 画像は localStorage に入れず IDB に
   ============================================================ */
const ReceiptStore = {
  _db: null,
  open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((res, rej) => {
      const r = indexedDB.open('salon-finance-receipts', 1);
      r.onupgradeneeded = (e) => e.target.result.createObjectStore('img');
      r.onsuccess = () => { this._db = r.result; res(r.result); };
      r.onerror = () => rej(r.error);
    });
  },
  async put(key, blob) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const t = db.transaction('img', 'readwrite');
      t.objectStore('img').put(blob, key);
      t.oncomplete = res; t.onerror = () => rej(t.error);
    });
  },
  async get(key) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const rq = db.transaction('img', 'readonly').objectStore('img').get(key);
      rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
    });
  },
  async del(key) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const t = db.transaction('img', 'readwrite');
      t.objectStore('img').delete(key);
      t.oncomplete = res; t.onerror = () => rej(t.error);
    });
  },
};

// カメラ/ファイルの画像を縮小してJPEG Blobに（容量節約）
function compressImage(file, maxW = 1280, quality = 0.7) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      cv.toBlob((b) => { URL.revokeObjectURL(img.src); res(b); }, 'image/jpeg', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ============================================================
   税額の概算（個人事業主 / 法人）
   ============================================================ */
function progressiveIncomeTax(taxable) {
  const brackets = [
    [1950000, 0.05, 0], [3300000, 0.10, 97500], [6950000, 0.20, 427500],
    [9000000, 0.23, 636000], [18000000, 0.33, 1536000],
    [40000000, 0.40, 2796000], [Infinity, 0.45, 4796000],
  ];
  for (const [cap, rate, ded] of brackets) if (taxable <= cap) return Math.max(0, taxable * rate - ded);
  return 0;
}

// 個人事業主の概算税額（年額）。businessIncome＝事業所得（青色控除前 ＝ 売上−経費）
function estimateSoleTax(businessIncome, opt) {
  const blue = opt.blueDeduction || 0;            // 青色申告特別控除
  const social = opt.socialInsurance || 0;         // 国保＋年金（社会保険料控除）
  const otherDed = opt.otherDeductions || 0;       // 生命保険料控除など
  const basic = 480000;                            // 基礎控除
  const afterBlue = Math.max(0, businessIncome - blue);
  const taxable = Math.max(0, afterBlue - basic - social - otherDed);
  const incomeTax = progressiveIncomeTax(taxable);
  const reconstruction = incomeTax * 0.021;        // 復興特別所得税
  const residentTax = taxable > 0 ? taxable * 0.10 + 5000 : 0; // 住民税（所得割10%＋均等割概算）
  const businessTax = Math.max(0, businessIncome - 2900000) * 0.05; // 個人事業税（美容業5%・事業主控除290万）
  const total = incomeTax + reconstruction + residentTax + businessTax;
  return { afterBlue, taxable, incomeTax, reconstruction, residentTax, businessTax, total };
}

/* 減価償却（定額法・月割・1円備忘価額）：取得年から対象年まで積み上げ、当期償却費と期首/期末簿価を出す */
function depreciate(asset, taxYear) {
  const cost = asset.cost || 0;
  const life = asset.usefulLife || 0;
  const ym = (asset.acquiredYM || '').split('-');
  const ay = parseInt(ym[0], 10);
  const am = parseInt(ym[1], 10) || 1;
  if (!cost || !life || !ay || taxYear < ay) {
    return { thisYear: 0, accum: 0, bookBegin: cost, bookEnd: cost, rate: life ? 1 / life : 0 };
  }
  const annual = cost / life;
  const floor = 1; // 備忘価額1円を残す
  let accum = 0, thisYear = 0, bookBegin = cost;
  for (let y = ay; y <= taxYear; y++) {
    if (y === taxYear) bookBegin = cost - accum; // 当期の期首簿価＝前年までの償却を引いた額
    const months = y === ay ? (12 - am + 1) : 12; // 取得年は月割
    let amt = annual * months / 12;
    amt = Math.min(amt, Math.max(0, cost - floor - accum)); // 簿価が1円を下回らないように
    accum += amt;
    if (y === taxYear) thisYear = amt;
  }
  return { thisYear: Math.round(thisYear), accum: Math.round(accum), bookBegin: Math.round(bookBegin), bookEnd: Math.round(cost - accum), rate: 1 / life };
}

/* ============================================================
   財務エンジン — state から派生指標をすべて計算する純粋関数
   ============================================================ */
function compute(s) {
  const c = s.current;
  // 売上：日次ログ（税込）から税別へ仕分け。なければ手入力の月商（税別）
  const taxRate = s.settings.taxRate || 0;
  const hoursPerDay = s.settings.businessHoursPerDay || 8;
  const grossOf = (d) => ((d.gross != null ? d.gross : d.amount) || 0); // 旧データ(amount)互換
  const logged = c.dailySales.filter((d) => grossOf(d) > 0);
  const dayCount = logged.length;
  const totalGross = logged.reduce((a, d) => a + grossOf(d), 0);
  const totalNet = totalGross / (1 + taxRate);
  const totalCustomers = logged.reduce((a, d) => a + (d.customers || 0), 0);
  const dailyAvgGross = dayCount ? totalGross / dayCount : 0;
  const dailyAvgNet = dayCount ? totalNet / dayCount : 0;
  const salesFromLog = dailyAvgNet * c.openDaysPerMonth;         // 税別の月商見込み
  const monthlySales = c.useLog && dayCount ? salesFromLog : c.monthlySales; // 税別
  // 効率指標
  const avgSpend = totalCustomers ? totalGross / totalCustomers : 0;  // 客単価（税込）
  const avgCustomersPerDay = dayCount ? totalCustomers / dayCount : 0;
  const hourlyNet = hoursPerDay ? dailyAvgNet / hoursPerDay : 0;       // 時間単価（税別）
  const consumptionTaxMonthly = monthlySales * taxRate;               // 預かり消費税（参考）
  const dailyAvg = dailyAvgNet; // 後方互換

  // 変動費
  const variableRate = c.materialCostRate + c.otherVariableRate;
  const variableCost = monthlySales * variableRate;
  const marginRate = 1 - variableRate; // 限界利益率
  const marginalProfit = monthlySales * marginRate; // 限界利益

  const isSole = s.settings.businessType === '個人事業主';

  // 会計期間：個人＝1〜12月 / 法人＝期首〜期末
  const fiscalStart = isSole ? 1 : (s.settings.fiscalStartMonth || 4);
  // スタッフの今期 在籍月数（startMonth未設定＝通年12ヶ月、設定あり＝その月から期末まで）
  const activeMonthsOf = (p) => {
    if (!p.startMonth) return 12;
    return 12 - (((p.startMonth - fiscalStart) % 12 + 12) % 12);
  };
  const staffAnnual = c.staff.map((p) => {
    const months = activeMonthsOf(p);
    return { id: p.id, months, annual: (p.monthlySalary || 0) * months };
  });
  const annualStaffSalary = staffAnnual.reduce((a, x) => a + x.annual, 0);

  // 人件費（従業員＝社会保険の会社負担を上乗せ）— 月次モデルは現在の在籍者ベース
  const staffSalary = c.staff.reduce((a, p) => a + (p.monthlySalary || 0), 0);
  const staffLabor = staffSalary * (1 + c.socialInsuranceRate);
  // オーナー報酬：法人のみ経費（役員報酬）。個人事業主は経費にならない（生活費で引き出す）
  const ownerPay = isSole ? 0 : c.ownerSalary;
  const laborCost = staffLabor + ownerPay;

  // 家事按分：自宅サロンの家賃・水道光熱は「事業に使う割合」だけを経費にする（既定100%）
  const rentBiz = c.rent * (c.rentBizRate ?? 1);
  const utilitiesBiz = c.utilities * (c.utilitiesBizRate ?? 1);

  // 減価償却：固定資産を耐用年数で分割計上。当期ぶんを経費（月割で固定費）に乗せる
  const _taxYear = s.settings.taxYear || new Date().getFullYear();
  const depAssets = (c.assets || []).map((a) => ({ id: a.id, label: a.label, cost: a.cost || 0, acquiredYM: a.acquiredYM, usefulLife: a.usefulLife, ...depreciate(a, _taxYear) }));
  const depTotalAnnual = depAssets.reduce((t, a) => t + a.thisYear, 0);
  const assetBookBegin = depAssets.reduce((t, a) => t + a.bookBegin, 0);
  const assetBookEnd = depAssets.reduce((t, a) => t + a.bookEnd, 0);
  const depMonthly = depTotalAnnual / 12;

  // 固定費（按分後の事業ぶん＋当期の減価償却ぶんで計上）
  const fixedCost = rentBiz + utilitiesBiz + c.otherFixed + laborCost + depMonthly;

  // 利益（個人事業主では＝事業所得・控除前 / 法人では税引前利益）
  const operatingProfit = monthlySales - variableCost - fixedCost;
  const profitRate = monthlySales ? operatingProfit / monthlySales : 0;

  /* ---- 生活費・税金・手取り ---- */
  const livingMonthly = s.living.items.reduce((a, x) => a + (x.amount || 0), 0);
  const livingAnnual = livingMonthly * 12;
  const businessIncomeAnnual = operatingProfit * 12; // 個人：事業所得(控除前) / 法人：税引前利益

  let taxAnnual, taxDetail;
  if (isSole) {
    taxDetail = estimateSoleTax(businessIncomeAnnual, {
      blueDeduction: s.settings.blueDeduction,
      socialInsurance: s.settings.socialInsurance,
      otherDeductions: s.settings.otherDeductions,
    });
    taxAnnual = taxDetail.total;
  } else {
    taxAnnual = Math.max(0, businessIncomeAnnual) * s.settings.corpTaxRate;
    taxDetail = { total: taxAnnual };
  }
  const taxMonthly = taxAnnual / 12;
  // 手取り（事業から個人に残るお金）
  const netMonthly = operatingProfit - taxMonthly;
  // 積立余力：個人＝手取り−生活費 / 法人＝税引後利益（生活費は役員報酬で別途充当済み）
  const monthlySavingCapacity = isSole ? netMonthly - livingMonthly : netMonthly;

  // 損益分岐点
  const breakEvenSales = marginRate > 0 ? fixedCost / marginRate : Infinity;
  const breakEvenRatio = monthlySales ? breakEvenSales / monthlySales : Infinity;
  const safetyMargin = monthlySales ? (monthlySales - breakEvenSales) / monthlySales : 0;

  // 年間
  const annualProfit = operatingProfit * 12;

  /* ---- 出店計画 ---- */
  const e = s.expansion;
  const interior = e.tsubo * e.interiorCostPerTsubo;
  const deposit = e.newRent * e.depositMonths;
  const recruit = e.recruitCostPerStaff * e.newStaffCount;
  const initialCost = interior + e.equipmentCost + deposit + recruit + e.miscInitial;

  // 新店の月次ランニング固定費
  const newLabor = e.newStaffCount * e.avgStaffSalary * (1 + c.socialInsuranceRate);
  const newRunningFixed = e.newRent + e.newUtilities + newLabor + e.newOtherFixed;
  const workingCapital = newRunningFixed * e.workingCapitalMonths;

  const totalNeeded = initialCost + workingCapital;

  // 自己資金目標 / 借入
  const selfFundsTarget = totalNeeded * e.selfFundsRatio;
  const loanNeeded = Math.max(0, totalNeeded - selfFundsTarget);

  // 積立計画：目標自己資金まで、現在の現預金からあといくら積むか
  const months = Math.max(1, e.yearsUntil * 12);
  const gapToSelfFunds = Math.max(0, selfFundsTarget - c.cashOnHand);
  const requiredMonthlySaving = gapToSelfFunds / months;
  // monthlySavingCapacity は生活費・税引後ベースで上で算出済み
  const savingShortfall = monthlySavingCapacity - requiredMonthlySaving; // プラスなら達成可能
  const projectedSelfFunds = c.cashOnHand + Math.max(0, monthlySavingCapacity) * months;
  const planFeasible = projectedSelfFunds >= selfFundsTarget;
  // 達成に必要な月数（現キャパで）
  const monthsToTarget = monthlySavingCapacity > 0 ? Math.ceil(gapToSelfFunds / monthlySavingCapacity) : Infinity;

  /* ---- 借入返済シミュレーション（元利均等） ---- */
  const L = s.loan;
  const principal = L.useLoanNeeded ? loanNeeded : L.amount;
  const r = L.interestRate / 12;
  const n = L.termYears * 12;
  const monthlyRepay = r > 0 ? (principal * r) / (1 - Math.pow(1 + r, -n)) : principal / n;
  const totalRepay = monthlyRepay * n;
  const totalInterest = totalRepay - principal;
  // 日本政策金融公庫の目安：自己資金の約2〜3倍が借入可能の目安
  const borrowableEstimate = c.cashOnHand * L.borrowMultiple;
  // 返済後の新店損益余力（新店が黒字化するまでの体力）
  const newStoreOperatingProfit = e.expectedMonthlySales - e.expectedMonthlySales * variableRate - newRunningFixed;
  const newStoreAfterRepay = newStoreOperatingProfit - monthlyRepay;

  /* ---- 領収書・経費の集計 ---- */
  const receipts = s.receipts || [];
  // 科目別合計（領収書）
  const receiptByCategory = {};
  let receiptTotal = 0;
  receipts.forEach((rcp) => {
    receiptByCategory[rcp.category] = (receiptByCategory[rcp.category] || 0) + (rcp.amount || 0);
    receiptTotal += rcp.amount || 0;
  });
  // 月別集計（売上ログ＋領収書）
  const monthsMap = {};
  const touch = (k) => (monthsMap[k] = monthsMap[k] || { sales: 0, expense: 0, count: 0, customers: 0, days: 0 });
  c.dailySales.forEach((d) => { if (d.date && grossOf(d) > 0) { const o = touch(ym(d.date)); o.sales += grossOf(d) / (1 + taxRate); o.customers += d.customers || 0; o.days++; } });
  receipts.forEach((rcp) => { if (rcp.date) { const o = touch(ym(rcp.date)); o.expense += rcp.amount || 0; o.count++; } });
  const monthly = Object.keys(monthsMap).sort().map((k) => ({
    month: k, ...monthsMap[k], profit: monthsMap[k].sales - monthsMap[k].expense,
    avgSpend: monthsMap[k].customers ? (monthsMap[k].sales * (1 + taxRate)) / monthsMap[k].customers : 0,
  }));

  /* ---- 今月の黒字メーター（積み上げ式） ---- */
  const _now = new Date();
  const thisMonthKey = `${_now.getFullYear()}-${String(_now.getMonth() + 1).padStart(2, '0')}`;
  const tmo = monthsMap[thisMonthKey] || { sales: 0, days: 0, customers: 0 };
  const thisMonthNet = tmo.sales;                 // 今月の売上（税別・実績）
  const thisMonthDays = tmo.days || 0;
  const beReached = thisMonthNet >= breakEvenSales;
  const beRemaining = Math.max(0, breakEvenSales - thisMonthNet);     // 黒字まであと（税別）
  const beSurplus = Math.max(0, thisMonthNet - breakEvenSales);       // 黒字の超過分（税別）
  // 残り営業日 ＝ 今日以降で「定休日・臨時休業・入力済み」を除いた日数
  const _y = _now.getFullYear(), _mo = _now.getMonth();
  const _dim = new Date(_y, _mo + 1, 0).getDate();
  const _closedWd = s.settings.closedWeekdays || [];
  const _closedDays = c.closedDays || [];
  const _recorded = new Set(c.dailySales.map((x) => x.date));
  let remainingOpenDays = 0;
  for (let dd = _now.getDate(); dd <= _dim; dd++) {
    const ds = `${thisMonthKey}-${String(dd).padStart(2, '0')}`;
    const wday = new Date(_y, _mo, dd).getDay();
    if (_recorded.has(ds)) continue;
    if (_closedWd.includes(wday)) continue;
    if (_closedDays.includes(ds)) continue;
    remainingOpenDays++;
  }
  const perDayToBE = (remainingOpenDays > 0 ? beRemaining / remainingOpenDays : beRemaining) * (1 + taxRate); // 税込/日
  // 今月のもうけ（実績ベース）＝ 今月売上×限界利益率 − 固定費
  const thisMonthProfit = thisMonthNet * marginRate - fixedCost;
  // 今年の積み上げもうけ（データのある月だけ合算）
  const _yearStr = String(_now.getFullYear());
  let ytdProfit = 0, ytdMonths = 0;
  monthly.forEach((r) => {
    if (r.month.slice(0, 4) === _yearStr && r.sales > 0) { ytdProfit += r.sales * marginRate - fixedCost; ytdMonths++; }
  });

  /* ---- 確定申告まとめ（年間・青色申告決算書ベース） ---- */
  // 売上：日次ログ実績があればその年換算、なければ月商×12
  const annualSales = monthlySales * 12;
  // 経費を科目別に（定期費用×12 ＋ 領収書）
  const expenseByItem = {
    '仕入（材料費）': monthlySales * c.materialCostRate * 12,
    '給料賃金': annualStaffSalary,
    '法定福利費': annualStaffSalary * c.socialInsuranceRate,
    '地代家賃': rentBiz * 12,
    '水道光熱費': utilitiesBiz * 12,
    'その他固定費': c.otherFixed * 12,
  };
  if (!isSole) expenseByItem['役員報酬'] = c.ownerSalary * 12;
  if (depTotalAnnual > 0) expenseByItem['減価償却費'] = depTotalAnnual;
  // 領収書の科目を加算
  Object.keys(receiptByCategory).forEach((cat) => {
    expenseByItem[cat] = (expenseByItem[cat] || 0) + receiptByCategory[cat];
  });
  const totalExpense = Object.values(expenseByItem).reduce((a, v) => a + v, 0);
  const grossProfit = annualSales - totalExpense; // 所得金額（青色控除前）＝事業所得

  /* ---- 1年の目標（月目標 vs 実績・着地予想） ---- */
  const plan = s.plan;
  const planYear = plan.year;
  const actualByMonth = Array(12).fill(0);
  c.dailySales.forEach((d) => {
    if (d.date && d.date.slice(0, 4) === String(planYear)) {
      const mi = parseInt(d.date.slice(5, 7), 10) - 1;
      if (mi >= 0 && mi < 12) actualByMonth[mi] += grossOf(d);
    }
  });
  const planRows = plan.monthlyTargets.map((t, i) => ({
    month: i + 1, target: t, actual: actualByMonth[i],
    rate: t ? actualByMonth[i] / t : 0,
  }));
  const planAnnualTarget = plan.monthlyTargets.reduce((a, v) => a + v, 0);
  const planActualTotal = actualByMonth.reduce((a, v) => a + v, 0);
  const monthsWithData = actualByMonth.filter((v) => v > 0).length;
  const planForecast = monthsWithData ? (planActualTotal / monthsWithData) * 12 : 0; // 着地予想
  const planAchievement = planAnnualTarget ? planActualTotal / planAnnualTarget : 0;
  const planForecastVsTarget = planAnnualTarget ? planForecast / planAnnualTarget : 0;

  return {
    isSole, livingMonthly, livingAnnual, businessIncomeAnnual,
    taxAnnual, taxMonthly, taxDetail, netMonthly,
    receiptByCategory, receiptTotal, receiptCount: receipts.length,
    monthly, annualSales, expenseByItem, totalExpense, grossProfit,
    planRows, planAnnualTarget, planActualTotal, monthsWithData,
    planForecast, planAchievement, planForecastVsTarget,
    fiscalStart, staffAnnual, annualStaffSalary,
    thisMonthNet, thisMonthDays, beReached, beRemaining, beSurplus, remainingOpenDays, perDayToBE,
    thisMonthProfit, ytdProfit, ytdMonths,
    taxRate, hoursPerDay, totalGross, totalNet, totalCustomers, dayCount,
    dailyAvgGross, dailyAvgNet, avgSpend, avgCustomersPerDay, hourlyNet, consumptionTaxMonthly,
    monthlySales, dailyAvg, salesFromLog, loggedCount: logged.length,
    variableRate, variableCost, marginRate, marginalProfit,
    staffSalary, laborCost, fixedCost,
    depAssets, depTotalAnnual, assetBookBegin, assetBookEnd, depMonthly,
    operatingProfit, profitRate, annualProfit,
    breakEvenSales, breakEvenRatio, safetyMargin,
    // expansion
    interior, deposit, recruit, initialCost,
    newLabor, newRunningFixed, workingCapital, totalNeeded,
    selfFundsTarget, loanNeeded, months, gapToSelfFunds,
    requiredMonthlySaving, monthlySavingCapacity, savingShortfall,
    projectedSelfFunds, planFeasible, monthsToTarget,
    // loan
    principal, monthlyRepay, totalRepay, totalInterest, borrowableEstimate,
    newStoreOperatingProfit, newStoreAfterRepay,
  };
}

// 数字入力（先頭ゼロを残さない／小数も可）。type=number の "02000000" 問題を回避
function NumInput({ value, onChange, className = '', placeholder = '0' }) {
  const [focused, setFocused] = useState(false);
  const [text, setText] = useState('');
  const norm = (raw) => {
    let c = raw.replace(/[^0-9.]/g, '');
    const parts = c.split('.');
    if (parts.length > 2) c = parts[0] + '.' + parts.slice(1).join('');
    c = c.replace(/^0+(?=\d)/, ''); // 先頭ゼロ除去（0.5 はそのまま）
    return c;
  };
  const display = focused ? text : (value ? String(value) : '');
  return (
    <input
      type="text" inputMode="decimal" value={display} placeholder={placeholder}
      onFocus={() => { setFocused(true); setText(value ? String(value) : ''); }}
      onBlur={() => setFocused(false)}
      onChange={(e) => {
        const c = norm(e.target.value);
        setText(c);
        const n = parseFloat(c);
        onChange(isNaN(n) ? 0 : n);
      }}
      className={className}
    />
  );
}

// CSV保存（iPhone対応：共有シート→「ファイルに保存」も可。ダメな端末はダウンロード）
// ※ title/text を付けると iOS で空のテキストが一緒に共有されるため、files のみ渡す
async function saveCSV(filename, csv) {
  const blob = new Blob([csv], { type: 'text/csv' });
  try {
    if (navigator.canShare && typeof File !== 'undefined') {
      const file = new File([blob], filename, { type: 'text/csv' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        return;
      }
    }
  } catch (e) { /* 共有不可・キャンセルならダウンロードへ */ }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// 印刷／PDF（iOS Safari対応：HTMLをBlobにして新しいタブで開く＝document.write不要）
// ※ window.open はクリックの同期コンテキストで呼ぶこと（ポップアップブロック回避）
function printDoc(title, bodyHtml) {
  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${title}</title>
<style>
  body{font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;color:#333;margin:0;padding:24px;-webkit-text-size-adjust:100%;}
  h1{font-size:18px;margin:0 0 4px;} .sub{color:#888;font-size:12px;margin-bottom:16px;}
  table{width:100%;border-collapse:collapse;margin-bottom:16px;}
  th,td{border-bottom:1px solid #ddd;padding:8px 6px;font-size:13px;text-align:left;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr.head td{background:#f5f5f5;font-weight:bold;}
  tr.total td{border-top:2px solid #999;font-weight:bold;}
  .note{color:#999;font-size:11px;margin-top:12px;line-height:1.5;}
  .bar{position:sticky;top:0;background:#fff;padding:10px 0 14px;display:flex;gap:8px;border-bottom:1px solid #eee;margin-bottom:16px;}
  .bar button{flex:1;padding:12px;border:0;border-radius:12px;font-size:15px;font-weight:bold;color:#fff;}
  .bar .p{background:#10b981;} .bar .c{background:#9ca3af;}
  .hint{color:#888;font-size:12px;text-align:center;margin:-8px 0 16px;}
  @media print { .bar,.hint{display:none;} body{padding:0;} }
</style></head><body>
  <div class="bar">
    <button class="p" onclick="window.print()">🖨️ 印刷 / PDFで保存</button>
    <button class="c" onclick="window.close()">閉じる</button>
  </div>
  <div class="hint">iPhoneは「印刷」を押したあと、プレビューを<b>ピンチで広げる→共有→ファイルに保存</b>でPDFになります。</div>
  ${bodyHtml}
</body></html>`;
  // 隠しiframeで印刷（iOS Safari・デスクトップ両対応・ポップアップ不要）
  try {
    const iframe = document.createElement('iframe');
    iframe.setAttribute('aria-hidden', 'true');
    iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
    document.body.appendChild(iframe);
    const doc = iframe.contentWindow.document;
    doc.open(); doc.write(html); doc.close();
    let done = false;
    const fire = () => {
      if (done) return;
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); done = true; } catch (e) { /* onload/タイマーで再試行 */ }
    };
    iframe.onload = fire;
    fire(); // 同期write後は多くの環境で即印刷できる（ユーザー操作のコンテキストを保つ）
    setTimeout(() => { if (!done) printDocFallback(html); }, 1200); // どちらも不発なら新タブへ
    setTimeout(() => { try { document.body.removeChild(iframe); } catch (e) {} }, 60000);
  } catch (e) {
    printDocFallback(html);
  }
}

// フォールバック：Blob URLを新しいタブで開いて手動で印刷ボタンを押してもらう
function printDocFallback(html) {
  const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  const win = window.open(url, '_blank');
  if (!win) location.href = url; // ポップアップ不可なら同じタブで開く
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

/* ============================================================
   損益分岐点チャート（SVG）
   ============================================================ */
function BreakEvenChart({ m }) {
  const W = 520, H = 300, pad = 48;
  const maxSales = Math.max(m.monthlySales, m.breakEvenSales) * 1.4 || 1;
  const x = (v) => pad + (v / maxSales) * (W - pad * 2);
  const y = (v) => H - pad - (v / maxSales) * (H - pad * 2);
  const salesLine = `M ${x(0)} ${y(0)} L ${x(maxSales)} ${y(maxSales)}`;
  const costAt = (sv) => m.fixedCost + sv * m.variableRate;
  const costLine = `M ${x(0)} ${y(costAt(0))} L ${x(maxSales)} ${y(costAt(maxSales))}`;
  const bx = x(m.breakEvenSales), by = y(m.breakEvenSales);
  const cur = x(m.monthlySales);
  const profitArea = `M ${bx} ${by} L ${x(maxSales)} ${y(maxSales)} L ${x(maxSales)} ${y(costAt(maxSales))} Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
      <rect x="0" y="0" width={W} height={H} fill="white" />
      {/* 利益ゾーン */}
      {isFinite(m.breakEvenSales) && <path d={profitArea} fill="#10b98122" />}
      {/* 軸 */}
      <line x1={pad} y1={H - pad} x2={W - pad} y2={H - pad} stroke="#cbd5e1" />
      <line x1={pad} y1={pad} x2={pad} y2={H - pad} stroke="#cbd5e1" />
      {/* 費用線 */}
      <path d={costLine} stroke="#f43f5e" strokeWidth="2.5" fill="none" />
      {/* 売上線 */}
      <path d={salesLine} stroke="#0ea5e9" strokeWidth="2.5" fill="none" />
      {/* 損益分岐点 */}
      {isFinite(m.breakEvenSales) && (
        <g>
          <circle cx={bx} cy={by} r="5" fill="#7c3aed" />
          <line x1={bx} y1={by} x2={bx} y2={H - pad} stroke="#7c3aed" strokeDasharray="4 3" />
          <text x={bx} y={H - pad + 16} fontSize="10" fill="#7c3aed" textAnchor="middle">ここが分かれ目</text>
        </g>
      )}
      {/* 現在の売上 */}
      <line x1={cur} y1={pad} x2={cur} y2={H - pad} stroke="#0ea5e9" strokeDasharray="3 3" opacity="0.5" />
      <text x={cur} y={pad - 6} fontSize="10" fill="#0ea5e9" textAnchor="middle">現在 {man(m.monthlySales)}</text>

/* ============================================================
   積立進捗チャート（自己資金の到達見込み）
   ============================================================ */
function SavingChart({ s, m }) {
  const W = 520, H = 220, pad = 40;
  const months = m.months;
  const target = m.selfFundsTarget;
  const start = s.current.cashOnHand;
  const cap = Math.max(0, m.monthlySavingCapacity);
  const maxY = Math.max(target, start + cap * months) * 1.1 || 1;
  const x = (mo) => pad + (mo / months) * (W - pad * 2);
  const y = (v) => H - pad - (v / maxY) * (H - pad * 2);
  const path = `M ${x(0)} ${y(start)} L ${x(months)} ${y(start + cap * months)}`;
  const ty = y(target);
  // 目標到達月
  const reachMonth = cap > 0 ? (target - start) / cap : Infinity;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
      <rect width={W} height={H} fill="white" />
      <line x1={pad} y1={H - pad} x2={W - pad} y2={H - pad} stroke="#cbd5e1" />
      <line x1={pad} y1={pad} x2={pad} y2={H - pad} stroke="#cbd5e1" />
      {/* 目標ライン */}
      <line x1={pad} y1={ty} x2={W - pad} y2={ty} stroke="#f59e0b" strokeDasharray="5 3" />
      <text x={W - pad} y={ty - 5} fontSize="10" fill="#f59e0b" textAnchor="end">自己資金目標 {man(target)}</text>
      {/* 積立見込み */}
      <path d={path} stroke="#10b981" strokeWidth="2.5" fill="none" />
      <circle cx={x(0)} cy={y(start)} r="4" fill="#10b981" />
      <circle cx={x(months)} cy={y(start + cap * months)} r="4" fill="#10b981" />
      {/* 到達点 */}
      {isFinite(reachMonth) && reachMonth <= months && reachMonth >= 0 && (
        <g>
          <circle cx={x(reachMonth)} cy={ty} r="5" fill="#7c3aed" />
          <text x={x(reachMonth)} y={ty + 16} fontSize="10" fill="#7c3aed" textAnchor="middle">{Math.ceil(reachMonth)}ヶ月で到達</text>
        </g>
      )}
      <text x={pad} y={H - pad + 14} fontSize="10" fill="#94a3b8">現在</text>
      <text x={W - pad} y={H - pad + 14} fontSize="10" fill="#94a3b8" textAnchor="end">{m.months}ヶ月後</text>
    </svg>
  );
}

function mascotTalk(s, m) {
  const lines = MASCOT_LINES[s.settings.mascotType] || MASCOT_LINES.cat;
  if (m.dayCount === 0) return lines.empty;
  if (m.operatingProfit < 0) return lines.loss;
  if (m.monthlySavingCapacity < 0) return lines.tight;
  if (m.monthsWithData > 0 && m.planForecastVsTarget >= 1) return lines.onTrack;
  if (m.safetyMargin > 0.2) return lines.safe;
  return lines.base;
}

          <span>今月はこれから！売上を入れると、黒字までの道のりが見えるよ 🐾</span>
        ) : m.beReached ? (
          <span>🎉 今月はもう黒字！いま <span className="tabnum">+{man(m.beSurplus)}</span> のプラス。ナイス！</span>
        ) : (
          <span>黒字まで あと <span className="tabnum text-base">{man(m.beRemaining)}</span>！<br />
            <span className="text-stone-500 font-medium">のこり{m.remainingOpenDays}日なら、1日 約 <b className="text-rose-500 tabnum">{yen(Math.round(m.perDayToBE / 100) * 100)}</b> 売れば届くよ 💪</span>
          </span>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   数字のつながり（どこから来てるの？）
   ============================================================ */
function FlowChain({ m }) {
  const Box = ({ label, val, tone, from }) => {
    const tones = { sky: 'bg-sky-50 text-sky-600', blue: 'bg-sky-50 text-sky-600', rose: 'bg-rose-50 text-rose-500', emerald: 'bg-emerald-50 text-emerald-600', violet: 'bg-blush text-rose-400' };
    return (
      <div className={'shrink-0 rounded-2xl px-3 py-2 text-center ' + (tones[tone] || tones.sky)}>
        <div className="text-[11px] font-bold opacity-80">{label}</div>
        <div className="text-sm font-extrabold tabnum">{val}</div>
        {from && <div className="text-[10px] opacity-60 mt-0.5">{from}</div>}
      </div>
    );
  };
  const Arrow = ({ op }) => (
    <div className="shrink-0 flex flex-col items-center text-stone-300 px-0.5">
      <span className="text-lg leading-none">→</span>
      {op && <span className="text-[10px] font-bold text-stone-400">{op}</span>}
    </div>
  );
  return (
    <Card className="p-4">
      <h3 className="font-bold text-stone-600 text-sm mb-3">数字のつながり 🔗 <span className="text-stone-400 font-normal">— どこから来てるの？</span></h3>
      <div className="flex items-center gap-1 overflow-x-auto pb-1">
        <Box label="毎日入力" val="売上＋客数" tone="sky" from="毎日タブ" />
        <Arrow op="今月ぶん合計" />
        <Box label="今月の売上" val={man(m.thisMonthNet)} tone="blue" />
        <Arrow op="−費用" />
        <Box label="お店の費用" val={'−' + man(m.fixedCost + m.thisMonthNet * m.variableRate)} tone="rose" from="費用タブ" />
        <Arrow op="＝" />
        <Box label="今月のもうけ" val={man(m.thisMonthProfit)} tone="emerald" />
        <Arrow op="つみあげ" />

  );
}

/* ============================================================

function StartGuide({ s, m, visited, goTab }) {
  const hasClosed = (s.settings.closedWeekdays && s.settings.closedWeekdays.length > 0) || (s.current.closedDays && s.current.closedDays.length > 0);
  const steps = [
    { n: 1, tab: 'cost', title: 'お店の費用を入れる', desc: '家賃・お給料・材料費をざっくり', cta: '設定する', done: visited.has('cost') },
    { n: 2, tab: 'sales', title: '定休日・お休みを入れる', desc: 'カレンダーで毎週の定休日や臨時休業を', cta: '入れる', done: hasClosed },
    { n: 3, tab: 'sales', title: '今日の売上を入れる', desc: '売上と客数だけでOK', cta: '入力する', done: m.dayCount > 0 },
    { n: 4, tab: 'plan', title: '1年の目標を決める', desc: '月ごとの目標を作る', cta: '決める', done: visited.has('plan') },
  ];
  const doneCount = steps.filter((x) => x.done).length;
  if (doneCount === steps.length) return null; // 全部終わったら隠す
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between mb-1">
        <h3 className="font-bold text-stone-600">はじめの4ステップ 🐾</h3>
        <span className="text-xs text-stone-400 font-bold">{doneCount}/4 完了</span>
      </div>
      <p className="text-sm text-stone-400 mb-4">この順番でなぞれば、ホームの数字がぜんぶ動き出すよ</p>
      <div className="space-y-2.5">
        {steps.map((st) => (
          <div key={st.n} className={'flex items-center gap-3 rounded-2xl p-3 border ' + (st.done ? 'border-emerald-100 bg-emerald-50' : 'border-stone-100')}>
            <div className={'w-9 h-9 rounded-full flex items-center justify-center font-extrabold shrink-0 ' + (st.done ? 'bg-emerald-400 text-white' : 'bg-rose-400 text-white')}>
              {st.done ? '✓' : st.n}
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-stone-700 text-sm">{st.title}</div>
              <div className="text-xs text-stone-400">{st.desc}</div>
            </div>
            {st.done
              ? <span className="text-xs font-bold text-emerald-500 shrink-0">できた！</span>

        ))}
      </div>
    </Card>
  );
}

// 日別カレンダー（売上ひと目＋休業日の管理＝月のまとめ・来月の準備）
function SalesCalendar({ entries, today, onPick, closedDays, closedWeekdays, onToggleClosed, onToggleWeekday }) {
  const [calMonth, setCalMonth] = useState(ym(today));
  const [mode, setMode] = useState('sales'); // 'sales' | 'closed'
  const [cy, cm] = calMonth.split('-').map(Number);
  const startWday = new Date(cy, cm - 1, 1).getDay();
  const daysInMonth = new Date(cy, cm, 0).getDate();
  const byDate = {}, byCust = {};
  entries.forEach((x) => { byDate[x.date] = (x.gross != null ? x.gross : x.amount) || 0; byCust[x.date] = x.customers || 0; });
  const short = (n) => (n >= 10000 ? (Math.round(n / 1000) / 10).toString().replace(/\.0$/, '') + '万' : String(Math.round(n)));
  const shiftMonth = (delta) => { const dt = new Date(cy, cm - 1 + delta, 1); setCalMonth(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`); };
  const isClosed = (ds, wday) => closedDays.includes(ds) || closedWeekdays.includes(wday);
  const wd = ['日', '月', '火', '水', '木', '金', '土'];
  const cells = [];
  for (let i = 0; i < startWday; i++) cells.push(null);
  for (let dd = 1; dd <= daysInMonth; dd++) cells.push(dd);
  // 当月集計
  let monthTotal = 0, monthCust = 0, workDays = 0, closedCount = 0;
  for (let dd = 1; dd <= daysInMonth; dd++) {
    const ds = `${calMonth}-${String(dd).padStart(2, '0')}`;
    const wday = new Date(cy, cm - 1, dd).getDay();
    if (byDate[ds] != null) { monthTotal += byDate[ds]; monthCust += byCust[ds] || 0; workDays++; }
    else if (isClosed(ds, wday)) closedCount++;
  }
  // 先月の合計（比較用）
  const prevDt = new Date(cy, cm - 2, 1);
  const prevKey = `${prevDt.getFullYear()}-${String(prevDt.getMonth() + 1).padStart(2, '0')}`;
  let prevTotal = 0, prevCust = 0;
  entries.forEach((x) => { if (x.date.slice(0, 7) === prevKey) { prevTotal += (x.gross != null ? x.gross : x.amount) || 0; prevCust += x.customers || 0; } });
  const diff = (now, prev) => { const d = now - prev; return d === 0 ? '±0' : (d > 0 ? '+' : '') + d; };
  return (
    <Card className="p-4">
      <div className="flex items-center justify-between mb-1">
        <button onClick={() => shiftMonth(-1)} className="w-7 h-7 rounded-full bg-stone-100 text-stone-500 font-bold text-sm">‹</button>
        <div className="text-center">
          <div className="font-bold text-stone-600 text-sm">{cy}年{cm}月</div>
          <div className="text-[11px] text-stone-400">営業{workDays}日 ・ 休み{closedCount}日</div>
        </div>
        <button onClick={() => shiftMonth(1)} className="w-7 h-7 rounded-full bg-stone-100 text-stone-500 font-bold text-sm">›</button>
      </div>

      {/* 合計と先月比較 */}
      <div className="grid grid-cols-2 gap-2 mb-1">
        <div className="bg-peach rounded-xl px-3 py-2 text-center">
          <div className="text-[10px] text-stone-400">売上計（税込）</div>
          <div className="font-extrabold text-rose-400 tabnum text-sm">{man(monthTotal)}</div>
          <div className="text-[10px] text-stone-400">先月 {man(prevTotal)}</div>
        </div>
        <div className="bg-sky-50 rounded-xl px-3 py-2 text-center">
          <div className="text-[10px] text-stone-400">客数計</div>
          <div className="font-extrabold text-sky-500 tabnum text-sm">{monthCust}人 <span className={'text-[10px] ' + (monthCust - prevCust >= 0 ? 'text-emerald-500' : 'text-rose-400')}>({diff(monthCust, prevCust)})</span></div>
          <div className="text-[10px] text-stone-400">先月 {prevCust}人</div>
        </div>
      </div>

      {/* タップの動作モード */}
      <div className="flex gap-1 bg-stone-100 rounded-full p-1 my-2 text-xs">
        <button onClick={() => setMode('sales')} className={'flex-1 py-1.5 rounded-full font-bold ' + (mode === 'sales' ? 'bg-white text-rose-400 shadow-soft' : 'text-stone-400')}>売上を入力</button>
        <button onClick={() => setMode('closed')} className={'flex-1 py-1.5 rounded-full font-bold ' + (mode === 'closed' ? 'bg-white text-stone-500 shadow-soft' : 'text-stone-400')}>お休みにする</button>
      </div>

      <div className="max-w-[20rem] mx-auto">
        <div className="grid grid-cols-7 gap-0.5 mb-0.5">
          {wd.map((w, i) => <div key={i} className={'text-center text-[9px] font-bold ' + (i === 0 ? 'text-rose-400' : i === 6 ? 'text-sky-400' : 'text-stone-400')}>{w}</div>)}
        </div>
        <div className="grid grid-cols-7 gap-0.5">
          {cells.map((dd, i) => {
            if (!dd) return <div key={i} />;
            const ds = `${calMonth}-${String(dd).padStart(2, '0')}`;
            const wday = (startWday + dd - 1) % 7;
            const amt = byDate[ds];
            const closed = amt == null && isClosed(ds, wday);
            const isToday = ds === today;
            const onClick = () => (mode === 'closed' ? onToggleClosed(ds) : onPick(ds));
            return (
              <button key={i} onClick={onClick}
                className={'aspect-square rounded-md flex flex-col items-center justify-center border transition-colors ' +
                  (amt != null ? 'bg-peach border-rose-100' : closed ? 'bg-stone-200 border-transparent' : 'bg-stone-50 border-transparent hover:bg-stone-100') +
                  (isToday ? ' ring-2 ring-rose-300' : '')}>
                <span className={'text-[9px] leading-none ' + (wday === 0 ? 'text-rose-400' : wday === 6 ? 'text-sky-400' : 'text-stone-400')}>{dd}</span>
                {amt != null
                  ? <>
                      <span className="text-[9px] font-bold text-rose-500 tabnum leading-none mt-0.5">{short(amt)}</span>
                      {byCust[ds] > 0 && <span className="text-[8px] text-sky-500 tabnum leading-none">{byCust[ds]}人</span>}
                    </>
                  : closed ? <span className="text-[8px] text-stone-400 leading-none mt-0.5">休</span> : null}
              </button>
            );
          })}
        </div>
      </div>

      {/* 定休日（曜日） */}
      <div className="mt-3 border-t border-stone-100 pt-3">
        <div className="text-[11px] text-stone-400 mb-1.5 text-center">毎週の定休日（タップで設定）</div>
        <div className="flex gap-1 justify-center">
          {wd.map((w, i) => (
            <button key={i} onClick={() => onToggleWeekday(i)}
              className={'w-8 h-8 rounded-full text-xs font-bold transition-colors ' + (closedWeekdays.includes(i) ? 'bg-stone-400 text-white' : 'bg-stone-100 text-stone-400')}>
              {w}
            </button>
          ))}
        </div>
      </div>
      <p className="text-[10px] text-stone-400 mt-2 text-center">
        {mode === 'sales' ? '日付をタップ → その日の売上を入力・修正' : '日付をタップ → 臨時休業のオン/オフ'}
      </p>
    </Card>
  );
}

function SalesTab({ s, setS, m }) {
  const c = s.current;
  const g = s.settings;
  const up = (patch) => setS({ ...s, current: { ...c, ...patch } });
  const upG = (patch) => setS({ ...s, settings: { ...g, ...patch } });
  const today = new Date().toISOString().slice(0, 10);
  const [d, setD] = useState({ date: today, gross: '', customers: '' });
  const [showSettings, setShowSettings] = useState(false);

  // 入力中のライブ計算
  const gross = parseFloat(d.gross) || 0;
  const customers = parseFloat(d.customers) || 0;
  const net = gross / (1 + (g.taxRate || 0));
  const tax = gross - net;
  const spend = customers ? gross / customers : 0;
  const hourly = g.businessHoursPerDay ? net / g.businessHoursPerDay : 0;

  const save = () => {
    if (!gross) return;
    const without = c.dailySales.filter((x) => x.date !== d.date); // 同日があれば上書き
    up({ dailySales: [...without, { date: d.date, gross, customers }].sort((a, b) => a.date.localeCompare(b.date)) });
    setD({ date: today, gross: '', customers: '' });
  };
  const delLog = (date) => up({ dailySales: c.dailySales.filter((x) => x.date !== date) });
  // カレンダーで日付タップ → その日を上の入力欄に読み込む
  const pickDate = (ds) => {
    const ex = c.dailySales.find((x) => x.date === ds);
    setD({ date: ds, gross: ex ? String((ex.gross != null ? ex.gross : ex.amount) || '') : '', customers: ex && ex.customers ? String(ex.customers) : '' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  // 臨時休業のオン/オフ
  const toggleClosed = (ds) => {
    const set = c.closedDays || [];
    up({ closedDays: set.includes(ds) ? set.filter((x) => x !== ds) : [...set, ds] });
  };
  // 定休日（曜日）のオン/オフ
  const toggleWeekday = (i) => {
    const set = g.closedWeekdays || [];
    upG({ closedWeekdays: set.includes(i) ? set.filter((x) => x !== i) : [...set, i] });
  };

  // 今月の集計
  const thisMonth = ym(today);
  const monthRows = c.dailySales.filter((x) => ym(x.date) === thisMonth);
  const monthGross = monthRows.reduce((a, x) => a + ((x.gross != null ? x.gross : x.amount) || 0), 0);
  const monthCust = monthRows.reduce((a, x) => a + (x.customers || 0), 0);

  return (
    <div className="space-y-4">
      {/* 今日の入力（ヒーロー） */}
      <Card className="p-5 bg-gradient-to-br from-white to-peach">
        <div className="flex items-center justify-between mb-1">
          <h3 className="font-extrabold text-rose-400 text-xl">今日のぶん、入力しよう！</h3>
          <input type="date" value={d.date} onChange={(e) => setD({ ...d, date: e.target.value })}
            className="border-2 border-stone-100 bg-white rounded-xl px-3 py-1.5 text-sm" />
        </div>
        <p className="text-sm text-stone-400 mb-4">入れるのは <b className="text-rose-400">売上</b> と <b className="text-rose-400">客数</b> だけ。あとは自動で計算します ☺️</p>
        <div className="grid sm:grid-cols-2 gap-4">
          <label className="block">
            <span className="text-sm text-stone-500 font-medium">税込の売上</span>
            <div className="mt-1.5 flex items-center rounded-2xl border-2 border-rose-200 bg-peach focus-within:border-rose-400 transition-colors overflow-hidden">
              <span className="pl-4 text-2xl text-rose-300 font-bold">¥</span>
              <input type="number" inputMode="numeric" value={d.gross} placeholder="0" step={1000}
                onChange={(e) => setD({ ...d, gross: e.target.value })}
                className="w-full px-2 py-3 outline-none tabnum text-right text-3xl font-extrabold text-stone-700 bg-transparent" />
            </div>
          </label>
          <label className="block">

          <div className="mt-3 grid sm:grid-cols-3 gap-4 border-t border-stone-100 pt-3">

            <Field label="月の営業日数" value={c.openDaysPerMonth} onChange={(v) => up({ openDaysPerMonth: v })} unit="日" step={1} hint="月商見込みの換算に使用" />
            <PercentField label="その他変動費率" value={c.otherVariableRate} onChange={(v) => up({ otherVariableRate: v })} step={1} hint="カード手数料など（材料費は「お店の費用」で設定）" />

              <div className="mt-1.5 flex gap-1 bg-stone-100 rounded-xl p-1">

                <button onClick={() => up({ useLog: false })} className={'flex-1 py-1.5 rounded-lg text-xs font-bold ' + (!c.useLog ? 'bg-white text-rose-400 shadow-soft' : 'text-stone-400')}>月商を直接</button>
              </div>
            </label>
            {!c.useLog && <Field label="月商（税別）" value={c.monthlySales} onChange={(v) => up({ monthlySales: v })} step={10000} />}

      {/* 今月のサマリー */}

        <KPI label="今月の客数" value={monthCust + '人'} sub={monthRows.length ? '1日平均 ' + (monthCust / monthRows.length).toFixed(1) + '人' : ''} tone="violet" big />
        <KPI label="平均 客単価(税込)" value={monthCust ? yen(monthGross / monthCust) : '—'} tone="red" big />
        <KPI label="月商見込み(税別)" value={man(m.salesFromLog)} sub={'平均×' + c.openDaysPerMonth + '日'} tone="green" big />
      </div>

      {/* 日別カレンダー（売上＋休業日の管理） */}
      <SalesCalendar entries={c.dailySales} today={today} onPick={pickDate}
        closedDays={c.closedDays || []} closedWeekdays={g.closedWeekdays || []}
        onToggleClosed={toggleClosed} onToggleWeekday={toggleWeekday} />

      {/* 履歴 */}
      <Card className="p-5">
        <h3 className="font-bold text-stone-600 mb-3">入力した記録</h3>
        <div className="max-h-80 overflow-auto">
          {c.dailySales.length === 0 && (
            <div className="text-center py-8">
              <div className="inline-block opacity-80"><Mascot type={s.settings.mascotType} size={72} mood="think" /></div>
              <div className="text-sm text-stone-400 mt-2">まだ記録がないにゃ。<br />上の「今日の入力」から始めよ〜</div>
            </div>
          )}
          {[...c.dailySales].reverse().map((row) => {
            const rg = (row.gross != null ? row.gross : row.amount) || 0;
            const rn = rg / (1 + (g.taxRate || 0));
            const rs = row.customers ? rg / row.customers : 0;
            return (
              <div key={row.date} className="flex items-center gap-3 py-2 border-b border-stone-100 text-sm">
                <span className="text-stone-400 w-24 shrink-0">{row.date}</span>
                <div className="flex-1 flex flex-wrap gap-x-4 gap-y-0.5">
                  <span className="tabnum font-bold text-stone-700">税込 {yen(rg)}</span>
                  <span className="tabnum text-emerald-500">税別 {yen(rn)}</span>
                  {row.customers ? <span className="tabnum text-stone-400">{row.customers}人 / 単価 {yen(rs)}</span> : null}
                </div>
                <button onClick={() => delLog(row.date)} className="text-rose-300 hover:text-rose-500 text-xs shrink-0">削除</button>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

const STAFF_ROLES = ['スタイリスト', 'アシスタント', 'アルバイト', 'レセプション', 'ネイリスト', 'アイリスト', '業務委託', 'その他'];

function periodLabel(isSole, fiscalStart, year) {
  if (isSole) return `${year}年 1月〜12月`;
  const endM = fiscalStart === 1 ? 12 : fiscalStart - 1;
  const endY = fiscalStart === 1 ? year : year + 1;
  return `${year}年${fiscalStart}月 〜 ${endY}年${endM}月`;
}

function StaffCard({ p, info, isSole, fiscalStart, year, onChange, onDelete }) {

        <NumInput value={p.monthlySalary} onChange={(v) => onChange({ monthlySalary: v })}

function CostTab({ s, setS, m }) {
  const c = s.current;

  const up = (patch) => setS({ ...s, current: { ...c, ...patch } });
  const upG = (patch) => setS({ ...s, settings: { ...g, ...patch } });

  const annualLaborWithIns = m.annualStaffSalary * (1 + c.socialInsuranceRate);

            期首（決算のはじまり）
            <select value={g.fiscalStartMonth} onChange={(e) => upG({ fiscalStartMonth: parseInt(e.target.value, 10) })}
              className="border-2 border-stone-100 bg-white rounded-xl px-2 py-1.5">
              {MONTH_NAMES.map((nm, i) => <option key={i} value={i + 1}>{nm}</option>)}

        <div className="space-y-3">
          {c.staff.map((p) => (

          <div className="flex justify-between"><span className="text-stone-400">毎月の人件費（保険込）</span><b className="tabnum text-rose-500">{man(m.laborCost)}</b></div>
          <div className="flex justify-between"><span className="text-stone-400">売上にしめる割合</span><b className="tabnum">{pct(m.monthlySales ? m.laborCost / m.monthlySales : 0)}</b></div>

// 家賃のざっくり相場（坪あたり月額・あくまで目安）
const RENT_AREAS = [
  { id: 'prime',  label: '都心の一等地', sub: '表参道・銀座 級', unit: 32000 },
  { id: 'urban',  label: '都市部・駅近', sub: '大都市の人気立地', unit: 20000 },
  { id: 'local',  label: '地方都市の中心', sub: '繁華街・駅前',    unit: 12000 },
  { id: 'suburb', label: '郊外・住宅街',   sub: 'ロードサイド等',  unit: 8000 },
];
const RENT_FLOORS = [
  { id: 'ground', label: '1階・路面', factor: 1.0,  note: '人通り◎・家賃は高め' },
  { id: 'upper',  label: '2階以上',   factor: 0.75, note: '路面の約7.5割' },
  { id: 'base',   label: '地下',      factor: 0.7,  note: '路面の約7割' },
];

function RentEstimator({ e, up }) {
  const area = RENT_AREAS.find((a) => a.id === e.rentArea) || RENT_AREAS[1];
  const floor = RENT_FLOORS.find((f) => f.id === e.rentFloor) || RENT_FLOORS[1];
  const estimate = Math.round((area.unit * e.tsubo * floor.factor) / 1000) * 1000;
  const lo = Math.round(estimate * 0.8 / 10000) * 10000;
  const hi = Math.round(estimate * 1.25 / 10000) * 10000;
  return (
    <Card className="p-5 bg-peach border-rose-100">
      <h3 className="font-bold text-stone-600 mb-1">🏠 家賃の目安をさがす</h3>
      <p className="text-sm text-stone-500 mb-3">エリアと階数をえらぶと、いまの「店舗の広さ（{e.tsubo}坪）」から家賃の目安を出します。</p>
      <div className="space-y-3">
        <div>
          <div className="text-xs text-stone-400 mb-1.5 font-medium">エリア</div>
          <div className="grid grid-cols-2 gap-2">
            {RENT_AREAS.map((a) => (
              <button key={a.id} type="button" onClick={() => up({ rentArea: a.id })}
                className={'rounded-2xl p-2.5 text-left border-2 transition-all ' + (e.rentArea === a.id ? 'border-rose-300 bg-white' : 'border-transparent bg-white/60')}>
                <div className="text-sm font-bold text-stone-600">{a.label}</div>
                <div className="text-xs text-stone-400">{a.sub}・坪 {man(a.unit)}</div>
              </button>
            ))}
          </div>
        </div>
        <div>
          <div className="text-xs text-stone-400 mb-1.5 font-medium">階数</div>
          <div className="grid grid-cols-3 gap-2">
            {RENT_FLOORS.map((f) => (
              <button key={f.id} type="button" onClick={() => up({ rentFloor: f.id })}
                className={'rounded-2xl p-2.5 text-center border-2 transition-all ' + (e.rentFloor === f.id ? 'border-rose-300 bg-white' : 'border-transparent bg-white/60')}>
                <div className="text-sm font-bold text-stone-600">{f.label}</div>
                <div className="text-[10px] text-stone-400 mt-0.5 leading-tight">{f.note}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="mt-4 bg-white rounded-2xl p-4">
        <div className="text-xs text-stone-400">この条件だと（{area.label}・{floor.label}・{e.tsubo}坪）</div>
        <div className="flex items-baseline gap-2 mt-1">
          <span className="text-2xl font-extrabold text-rose-400 tabnum">{man(estimate)}</span>
          <span className="text-sm text-stone-400">/ 月くらい</span>
        </div>
        <div className="text-xs text-stone-400 mt-1">だいたい {man(lo)}〜{man(hi)} の幅でみておくと安心</div>
        <button type="button" onClick={() => up({ newRent: estimate })}
          className="mt-3 w-full py-2.5 rounded-2xl font-bold text-sm bg-rose-400 hover:bg-rose-500 text-white transition-colors">
          この金額を「新店の家賃」に入れる
        </button>
      </div>
      <p className="text-xs text-stone-400 mt-3">※あくまでザックリ目安。実際の家賃は物件・路線・坪数で大きく変わります。気になる物件が見つかったら実額に直してね。</p>
    </Card>
  );
}

// プリセットからの初期費用ざっくり概算（内訳表と同じ式）
function presetRoughCost(v) {
  const interior = v.tsubo * v.interiorCostPerTsubo;
  const deposit = v.newRent * v.depositMonths;
  const recruit = v.recruitCostPerStaff * v.newStaffCount;
  return interior + v.equipmentCost + deposit + recruit + v.miscInitial;
}

const EXPENSE_CATEGORIES = [
  '仕入（材料費）', '消耗品費', '広告宣伝費', '旅費交通費', '通信費',
  '接待交際費', '水道光熱費', '地代家賃', '修繕費', '新聞図書費',
  '福利厚生費', '租税公課', '損害保険料', '雑費',
];

// 科目の自動推定（キーワード）
const CATEGORY_KEYWORDS = [
  ['仕入（材料費）', ['カラー', 'パーマ', '薬剤', 'ディーラー', '材料', 'シャンプー', 'トリートメント', 'ワックス', 'ビューティ', 'ミルボン', '資生堂', '卸']],
  ['消耗品費', ['ホーマック', 'カインズ', 'ニトリ', '無印', 'ダイソー', '文具', 'タオル', 'ホイル', 'コットン', 'ドラッグ', 'マツモトキヨシ', 'ウエルシア']],
  ['旅費交通費', ['ガソリン', 'エネオス', 'コスモ', '出光', 'タクシー', 'JR', '駐車', 'パーキング', 'ETC', '高速', '電車', 'バス']],
  ['通信費', ['ドコモ', 'au', 'ソフトバンク', '楽天モバイル', 'NTT', 'インターネット', 'wifi', 'Wi-Fi']],
  ['接待交際費', ['居酒屋', 'レストラン', 'カフェ', 'スターバックス', 'ドトール', '飲食', '寿司', '焼肉', 'お祝い', 'ギフト']],
  ['水道光熱費', ['電力', '電気', 'ガス', '水道', '東京電力', '関西電力', '九州電力']],
  ['広告宣伝費', ['ホットペッパー', 'インスタ', '広告', 'チラシ', '印刷', 'グーグル', 'Google広告', 'SNS']],
  ['新聞図書費', ['書店', '本', '雑誌', 'Amazon', '新聞']],
];
function guessCategory(text) {
  const t = (text || '').toLowerCase();
  for (const [cat, kws] of CATEGORY_KEYWORDS) {
    if (kws.some((k) => t.includes(k.toLowerCase()))) return cat;
  }
  return '消耗品費';
}

// OCRテキストから 金額・日付・店名・科目 を推定
function parseReceiptText(text) {
  const lines = text.split(/\n/).map((l) => l.trim()).filter(Boolean);
  const grabMax = (str) => {
    let max = 0, mt; const re = /([0-9][0-9,]{1,})/g;
    while ((mt = re.exec(str))) { const n = parseInt(mt[1].replace(/,/g, ''), 10); if (n > max && n < 9000000) max = n; }
    return max;
  };
  // 金額：合計系の行を優先、なければ全体の最大値
  let amount = 0;
  const totalLine = lines.find((l) => /(合\s*計|総額|お会計|お買上|税込|計\b)/.test(l));
  if (totalLine) amount = grabMax(totalLine);
  if (!amount) { lines.forEach((l) => { const n = grabMax(l); if (n > amount) amount = n; }); }
  // 日付
  let date = '';
  const dm = text.match(/(20\d{2})\s*[\/\-年\.]\s*(\d{1,2})\s*[\/\-月\.]\s*(\d{1,2})/);
  if (dm) date = `${dm[1]}-${String(dm[2]).padStart(2, '0')}-${String(dm[3]).padStart(2, '0')}`;
  // 店名：数字記号だけでない、ある程度の長さの先頭行
  const vendor = (lines.find((l) => l.length >= 2 && l.length <= 24 && !/^[0-9¥\\,\.\-\/:：\s]+$/.test(l)) || '').slice(0, 24);
  return { amount, date, vendor, category: guessCategory(text) };
}

/* ============================================================
   ★ OCR（レシート自動読み取り）プロバイダ切替
   ──────────────────────────────────────────────
   使うサービスが決まったら、ここを変えるだけで差し替えできます。
   ・provider を 'tesseract' | 'google' | 'azure' | 'off' から選ぶ
   ・クラウドOCRを使うときは apiKey / endpoint を入れて、下の該当関数に実装
   ============================================================ */
const OCR_CONFIG = {
  provider: 'tesseract',  // ← ここを差し替えるだけでOCRを変更できます（'off'で自動読み取り無効）
  apiKey: '',             // Google/Azure等を使う場合に設定
  endpoint: '',           // 同上（必要な場合）
};
const OCR_PROVIDERS = {
  // 自動読み取りオフ（手入力のみ）
  off: async () => { throw { code: 'off' }; },
  // 端末内でOCR（無料・APIキー不要。日本語モデルは初回のみDL）
  tesseract: async (blob, onProgress) => {
    if (typeof Tesseract === 'undefined') throw { code: 'unavailable' };
    const { data } = await Tesseract.recognize(blob, 'jpn+eng', {
      logger: (mm) => { if (mm.status === 'recognizing text') onProgress && onProgress(mm.progress); },
    });
    return data.text || '';
  },
  // Google Cloud Vision を使う場合はここに実装（OCR_CONFIG.apiKey を使用）
  google: async (blob, onProgress) => {
    // TODO: fetch('https://vision.googleapis.com/v1/images:annotate?key='+OCR_CONFIG.apiKey, {...})
    throw { code: 'notimpl' };
  },
  // Azure / その他のOCRを使う場合はここに実装
  azure: async (blob, onProgress) => {
    // TODO: OCR_CONFIG.endpoint / apiKey を使って実装
    throw { code: 'notimpl' };
  },
};
// 画像 → テキスト（設定中のプロバイダで実行）
async function recognizeReceipt(blob, onProgress) {
  const fn = OCR_PROVIDERS[OCR_CONFIG.provider] || OCR_PROVIDERS.off;
  return fn(blob, onProgress);
}

function ReceiptThumb({ id, hasImage }) {
  const [url, setUrl] = useState(null);
  useEffect(() => {
    let u;
    if (hasImage) ReceiptStore.get(id).then((blob) => { if (blob) { u = URL.createObjectURL(blob); setUrl(u); } });
    return () => u && URL.revokeObjectURL(u);
  }, [id, hasImage]);
  if (!hasImage) return <div className="w-14 h-14 rounded-xl bg-stone-100 flex items-center justify-center text-stone-300 text-xs shrink-0">なし</div>;
  if (!url) return <div className="w-14 h-14 rounded-xl bg-stone-100 animate-pulse shrink-0" />;
  return <a href={url} target="_blank" rel="noreferrer"><img src={url} className="w-14 h-14 rounded-xl object-cover shrink-0 border border-stone-200" /></a>;
}

function ReceiptTab({ s, setS, m }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState({ date: today, vendor: '', amount: '', category: EXPENSE_CATEGORIES[0], memo: '', docType: 'receipt' });
  const [pending, setPending] = useState(null); // 撮影した画像のBlob（保存待ち）
  const [previewUrl, setPreviewUrl] = useState(null);
  const [ocr, setOcr] = useState({ status: 'idle', progress: 0 }); // idle|reading|done|filled|error|unavailable
  const [filter, setFilter] = useState('all'); // all|receipt|invoice
  const fileRef = useRef(null);

  // よく使う支払先：過去の登録から頻度順に上位を出す
  const frequentVendors = useMemo(() => {
    const count = {};
    (s.receipts || []).forEach((r) => { const v = (r.vendor || '').trim(); if (v) count[v] = (count[v] || 0) + 1; });
    return Object.keys(count).sort((a, b) => count[b] - count[a]).slice(0, 8);
  }, [s.receipts]);

  const runOCR = async (blob) => {
    if (OCR_CONFIG.provider === 'off') { setOcr({ status: 'off', progress: 0 }); return; }
    setOcr({ status: 'reading', progress: 0 });
    try {
      const text = await recognizeReceipt(blob, (p) => setOcr({ status: 'reading', progress: p }));
      const parsed = parseReceiptText(text);
      setForm((f) => ({
        ...f,
        amount: parsed.amount ? String(parsed.amount) : f.amount,
        date: parsed.date || f.date,
        vendor: parsed.vendor || f.vendor,
        category: parsed.category || f.category,
      }));
      setOcr({ status: 'filled', progress: 1, got: parsed });
    } catch (err) {
      const code = err && err.code;
      setOcr({ status: code === 'unavailable' ? 'unavailable' : code === 'off' ? 'off' : 'error', progress: 0 });
    }
  };

  const onPick = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const blob = await compressImage(file);
    setPending(blob);
    setPreviewUrl((old) => { if (old) URL.revokeObjectURL(old); return URL.createObjectURL(blob); });
    runOCR(blob); // 自動で読み取り → フォームに反映
  };

  const save = async () => {
    const id = 'r' + Date.now();
    if (pending) await ReceiptStore.put(id, pending);
    const rcp = {
      id, date: form.date, vendor: form.vendor,
      amount: parseFloat(form.amount) || 0, category: form.category,
      memo: form.memo, hasImage: !!pending, docType: form.docType || 'receipt',

    setS({ ...s, receipts: [rcp, ...(s.receipts || [])] });
    setForm({ date: today, vendor: '', amount: '', category: form.category, memo: '', docType: form.docType });
    setPending(null);
    setPreviewUrl((old) => { if (old) URL.revokeObjectURL(old); return null; });
    setOcr({ status: 'idle', progress: 0 });
    if (fileRef.current) fileRef.current.value = '';
  };

  const del = async (rcp) => {
    if (rcp.hasImage) await ReceiptStore.del(rcp.id);
    setS({ ...s, receipts: s.receipts.filter((x) => x.id !== rcp.id) });
  };

// 青色申告決算書（損益）の経費欄＝並び順。サロねこの科目をここへ寄せる
const TAX_FORM_MAP = [
  { field: '租税公課',   from: ['租税公課'] },
  { field: '水道光熱費', from: ['水道光熱費'] },
  { field: '旅費交通費', from: ['旅費交通費'] },
  { field: '通信費',     from: ['通信費'] },
  { field: '広告宣伝費', from: ['広告宣伝費'] },
  { field: '接待交際費', from: ['接待交際費'] },
  { field: '損害保険料', from: ['損害保険料'] },
  { field: '修繕費',     from: ['修繕費'] },
  { field: '消耗品費',   from: ['消耗品費'] },
  { field: '減価償却費', from: ['減価償却費'] },
  { field: '福利厚生費', from: ['福利厚生費', '法定福利費'] },
  { field: '給料賃金',   from: ['給料賃金'] },
  { field: '地代家賃',   from: ['地代家賃'] },
  { field: '雑費',       from: ['雑費', '新聞図書費', 'その他固定費'] },
];

// expenseByItem → 決算書の並びに整理（漏れは雑費へ寄せて合計を一致させる）
function buildTaxTranscript(m) {
  const ebi = m.expenseByItem || {};
  const used = new Set(['仕入（材料費）']);
  const cogs = ebi['仕入（材料費）'] || 0; // 売上原価（仕入金額）
  const lines = TAX_FORM_MAP.map(({ field, from }) => {
    let amount = 0; const merged = [];
    from.forEach((k) => { if (ebi[k] != null) { amount += ebi[k]; used.add(k); if (ebi[k] > 0 && k !== field) merged.push(k); } });
    return { field, amount, merged };
  });
  // どのmapにも該当しない科目（役員報酬など）は雑費へ寄せる
  const misc = lines.find((l) => l.field === '雑費');
  Object.keys(ebi).forEach((k) => { if (!used.has(k)) { misc.amount += ebi[k]; if (ebi[k] > 0) misc.merged.push(k); } });
  return { cogs, lines };
}

// 数字＋ワンタップコピー（確定申告コーナーへ転記しやすく）
function CopyNum({ value, strong }) {
  const [done, setDone] = useState(false);
  const copy = () => {
    const txt = String(Math.round(value || 0));
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt);
      else { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
    } catch (e) {}
    setDone(true); setTimeout(() => setDone(false), 1200);
  };
  return (
    <button type="button" onClick={copy}
      className={'inline-flex items-center gap-1.5 rounded-lg px-2 py-0.5 transition-colors ' + (done ? 'bg-emerald-100' : 'hover:bg-stone-100')}>
      <span className={'tabnum ' + (strong ? 'font-bold text-emerald-600' : 'text-stone-600')}>{yen(value)}</span>
      <span className={'text-xs ' + (done ? 'text-emerald-500' : 'text-stone-300')}>{done ? 'コピー✓' : '⧉'}</span>
    </button>
  );
}

const ASSET_PRESETS = [

              <label className="block">

// 貸借対照表（65万円控除用・実用版）：期首/期末残高から元入金・事業主貸借を自動で釣り合わせる
function BSCard({ s, setS, m }) {
  const g = s.settings;
  const up = (patch) => setS({ ...s, settings: { ...g, ...patch } });
  const endCash = s.current.cashOnHand || 0;            // 期末の現金・預金（お店の費用の現預金）
  const openCash = g.bsOpenCash || 0;
  const openLoan = g.bsOpenLoan || 0;
  const endLoan = g.bsEndLoan || 0;
  const recvEnd = g.bsReceivableEnd || 0;
  const fixedBegin = m.assetBookBegin || 0;
  const fixedEnd = m.assetBookEnd || 0;
  const capital = openCash + fixedBegin - openLoan;     // 元入金（期首資本）
  const income = Math.max(0, m.grossProfit || 0);       // 青色申告特別控除前の所得金額
  const assetEnd = endCash + recvEnd + fixedEnd;        // 期末資産（事業主貸の前）
  const liabEnd = endLoan;
  const net = (liabEnd + capital + income) - assetEnd;  // ＞0なら事業主貸／＜0なら事業主借
  const ownerLoan = net > 0 ? net : 0;
  const ownerBorrow = net < 0 ? -net : 0;
  const assetTotal = assetEnd + ownerLoan;
  const liabTotal = liabEnd + capital + income + ownerBorrow;
  const balanced = Math.abs(assetTotal - liabTotal) < 1;

  const BRow = ({ label, value, note, strong }) => (
    <div className="flex justify-between items-center py-1">
      <span className={'text-sm ' + (strong ? 'font-bold text-stone-700' : 'text-stone-500')}>
        {label}{note && <span className="block text-xs text-stone-300">{note}</span>}
      </span>
      <CopyNum value={value} strong={strong} />
    </div>
  );

  return (
    <Card className="p-5">
      <h3 className="font-bold text-stone-600 mb-1">📘 貸借対照表（65万円控除用）</h3>
      <p className="text-sm text-stone-400 mb-3">65万・55万円控除には<b>貸借対照表（BS）</b>が必要です。下の期首・期末の残高を入れると、<b>元入金と事業主貸借を自動で釣り合わせて</b>BSを作ります（下ごしらえ）。金額タップで1円コピー。</p>

      <div className="grid sm:grid-cols-2 gap-x-6 gap-y-3 mb-4">
        <Field label="期首（1/1）の現金・預金" value={openCash} onChange={(v) => up({ bsOpenCash: v })} step={10000} hint="昨年末＝今年初めの残高" />
        <Field label="期首（1/1）の借入金" value={openLoan} onChange={(v) => up({ bsOpenLoan: v })} step={10000} hint="無ければ0" />
        <Field label="期末（12/31）の借入金" value={endLoan} onChange={(v) => up({ bsEndLoan: v })} step={10000} hint="年末の残高。無ければ0" />
        <Field label="期末（12/31）の売掛金" value={recvEnd} onChange={(v) => up({ bsReceivableEnd: v })} step={10000} hint="未入金のカード売上など。無ければ0" />
      </div>

      <div className="grid md:grid-cols-2 gap-3">
        <div className="bg-sky-50 rounded-2xl px-4 py-3">
          <div className="text-xs text-sky-600 font-bold mb-1">■ 資産の部（期末）</div>
          <BRow label="現金・預金" value={endCash} note="お店の費用の現預金を使用" />
          {recvEnd > 0 && <BRow label="売掛金" value={recvEnd} />}
          <BRow label="固定資産（減価償却後）" value={fixedEnd} note="減価償却の期末簿価" />
          {ownerLoan > 0 && <BRow label="事業主貸" value={ownerLoan} note="自動で釣り合わせ" />}
          <div className="border-t border-sky-200 mt-1"><BRow label="資産合計" value={assetTotal} strong /></div>
        </div>
        <div className="bg-rose-50 rounded-2xl px-4 py-3">
          <div className="text-xs text-rose-500 font-bold mb-1">■ 負債・資本の部（期末）</div>
          {endLoan > 0 && <BRow label="借入金" value={endLoan} />}
          <BRow label="元入金" value={capital} note="期首資産−期首負債（自動）" />
          {ownerBorrow > 0 && <BRow label="事業主借" value={ownerBorrow} note="自動で釣り合わせ" />}
          <BRow label="青色申告特別控除前の所得金額" value={income} note="損益から自動" />
          <div className="border-t border-rose-200 mt-1"><BRow label="負債・資本合計" value={liabTotal} strong /></div>
        </div>
      </div>

      <div className={'mt-3 rounded-2xl p-3 text-sm font-bold text-center ' + (balanced ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700')}>
        {balanced ? '✓ 貸借バランス OK（資産 ＝ 負債＋資本）' : '⚠️ バランスがずれています'}
      </div>
      <p className="text-xs text-stone-400 mt-2">※「事業主貸／借」は生活費の引き出しや自己資金の入金をまとめて自動で釣り合わせた概算です。複式簿記を厳密につけている場合は会計ソフト／税理士の数字を優先してください。</p>
    </Card>
  );
}

// 印刷プレビュー：画面内に全画面オーバーレイで出し、メインの window.print() で印刷（iOS Safari対応）
function PrintOverlay({ html, onClose }) {
  useEffect(() => {
    document.body.classList.add('overflow-hidden');
    return () => document.body.classList.remove('overflow-hidden');
  }, []);
  return (
    <div className="print-overlay fixed inset-0 z-50 bg-stone-900/40 flex items-end sm:items-center justify-center sm:p-6" onClick={onClose}>
      <div className="bg-white w-full sm:max-w-lg max-h-[92vh] rounded-t-3xl sm:rounded-3xl overflow-hidden flex flex-col" onClick={(e) => e.stopPropagation()}>
        <div className="no-print flex gap-2 p-3 border-b border-stone-100 shrink-0">
          <button onClick={() => window.print()} className="flex-1 bg-emerald-500 active:bg-emerald-600 text-white py-3 rounded-2xl font-bold">🖨️ 印刷 / PDFで保存</button>
          <button onClick={onClose} className="px-5 bg-stone-100 active:bg-stone-200 text-stone-500 py-3 rounded-2xl font-bold">閉じる</button>
        </div>
        <div className="no-print px-4 py-2 text-xs text-stone-400 text-center shrink-0">iPhoneは「印刷」→プレビューを<b>ピンチで広げる→共有→ファイルに保存</b>でPDFになります。</div>
        <div className="overflow-auto p-5">
          <div className="print-sheet" dangerouslySetInnerHTML={{ __html: html }} />
        </div>
      </div>
    </div>
  );
}

function TaxTab({ s, setS, m }) {
  const [printView, setPrintView] = useState(null);
  const g = s.settings;
  const up = (patch) => setS({ ...s, settings: { ...g, ...patch } });

  const transcript = buildTaxTranscript(m);
  const incomeBeforeBlue = m.grossProfit;                                   // 青色申告特別控除前の所得金額
  const blue = m.isSole ? (g.blueDeduction || 0) : 0;
  const incomeAfterBlue = Math.max(0, incomeBeforeBlue - blue);            // 所得金額

  const exportCSV = () => {
    const rows = [['行', '科目', '金額（円）']];
    rows.push(['収入', '売上（収入）金額', Math.round(m.annualSales)]);
    if (transcript.cogs > 0) rows.push(['売上原価', '仕入金額', Math.round(transcript.cogs)]);
    transcript.lines.forEach((l) => rows.push(['経費', l.field, Math.round(l.amount)]));
    rows.push(['計算', '経費計', Math.round(m.totalExpense - transcript.cogs)]);
    rows.push(['計算', '青色申告特別控除前の所得金額', Math.round(incomeBeforeBlue)]);
    if (m.isSole) {
      rows.push(['控除', '青色申告特別控除', blue]);
      rows.push(['計算', '所得金額', Math.round(incomeAfterBlue)]);
      rows.push(['（参考）税', '所得税', Math.round(m.taxDetail.incomeTax)]);
      rows.push(['（参考）税', '復興特別所得税', Math.round(m.taxDetail.reconstruction)]);
      rows.push(['（参考）税', '住民税', Math.round(m.taxDetail.residentTax)]);
      rows.push(['（参考）税', '個人事業税', Math.round(m.taxDetail.businessTax)]);
    } else {
      rows.push(['（参考）税', '法人税等（概算）', Math.round(m.taxAnnual)]);
    }
    rows.push(['（参考）税', '税金合計（概算）', Math.round(m.taxAnnual)]);
    const csv = '﻿' + rows.map((r) => r.join(',')).join('\n');
    saveCSV(`確定申告_転記用_${g.taxYear}.csv`, csv);
  };

  const printSummary = () => {
    const yenC = (n) => '¥' + Math.round(n || 0).toLocaleString('ja-JP');
    let rows = '';
    rows += `<tr class="head"><td>収入金額</td><td class="num"></td></tr>`;
    rows += `<tr><td>売上（収入）金額</td><td class="num">${yenC(m.annualSales)}</td></tr>`;
    if (transcript.cogs > 0) {
      rows += `<tr class="head"><td>売上原価</td><td class="num"></td></tr>`;
      rows += `<tr><td>仕入金額</td><td class="num">${yenC(transcript.cogs)}</td></tr>`;
    }
    rows += `<tr class="head"><td>経費（決算書の科目順）</td><td class="num"></td></tr>`;
    transcript.lines.filter((l) => l.amount > 0).forEach((l) => {
      rows += `<tr><td>${l.field}</td><td class="num">${yenC(l.amount)}</td></tr>`;
    });
    rows += `<tr class="total"><td>経費計</td><td class="num">${yenC(m.totalExpense - transcript.cogs)}</td></tr>`;
    rows += `<tr class="head"><td>所得金額</td><td class="num"></td></tr>`;
    rows += `<tr><td>青色申告特別控除前の所得金額</td><td class="num">${yenC(incomeBeforeBlue)}</td></tr>`;
    rows += `<tr><td>− 青色申告特別控除</td><td class="num">${yenC(blue)}</td></tr>`;
    rows += `<tr class="total"><td>所得金額</td><td class="num">${yenC(incomeAfterBlue)}</td></tr>`;
    const body = `<h1>確定申告まとめ（${g.taxYear}年）</h1>
      <div class="sub">サロねこ ／ 青色申告決算書（損益）ベース・金額は概算</div>
      <table><tbody>${rows}</tbody></table>
      <div class="note">※新聞図書費・その他固定費など決算書に無い科目は「雑費」へまとめています。<br>
      ※金額はすべて概算です。最終的な申告・納税額は国税庁『確定申告書等作成コーナー』または税理士でご確認ください。</div>`;
    setPrintView(body);
  };

  return (

            {['個人事業主', '法人'].map((t) => (

                {t}

            ))}
          </div>
        </div>
        {m.isSole ? (
          <div className="grid md:grid-cols-3 gap-x-6 gap-y-3 mt-4">
            <label className="block">
              <span className="text-sm text-stone-500 font-medium">青色申告特別控除</span>

          </div>

          <div className="space-y-1.5 text-sm">

const MONTH_NAMES = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

function PlanTab({ s, setS, m }) {
  const plan = s.plan;
  const up = (patch) => setS({ ...s, plan: { ...plan, ...patch } });
  const setMonth = (i, v) => {
    const t = [...plan.monthlyTargets];
    t[i] = v;
    up({ monthlyTargets: t });
  };
  const [annualInput, setAnnualInput] = useState('');
  const splitEven = () => {
    const total = parseFloat(annualInput) || m.planAnnualTarget;
    const per = Math.round(total / 12 / 10000) * 10000;
    up({ monthlyTargets: Array(12).fill(per) });
  };
  const maxV = Math.max(1, ...m.planRows.map((r) => Math.max(r.target, r.actual)));

  const forecastTone = m.planForecastVsTarget >= 1 ? 'green' : m.planForecastVsTarget >= 0.9 ? 'amber' : 'red';

  return (
    <div className="space-y-4">
      {/* ひとことサマリー */}
      <Card className="p-5">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-stone-600 text-lg">{plan.year}年の目標</h3>
          <div className="flex items-center gap-1 text-sm">
            <button onClick={() => up({ year: plan.year - 1 })} className="w-8 h-8 rounded-full bg-stone-100 text-stone-500 font-bold">‹</button>
            <span className="w-14 text-center font-bold text-stone-600">{plan.year}年</span>
            <button onClick={() => up({ year: plan.year + 1 })} className="w-8 h-8 rounded-full bg-stone-100 text-stone-500 font-bold">›</button>
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          <KPI label="1年の目標（合計）" value={man(m.planAnnualTarget)} tone="violet" big />
          <KPI label="今までの合計" value={man(m.planActualTotal)} sub={'達成 ' + pct(m.planAchievement)} tone="blue" big />
          <KPI label="このままいくと…（着地予想）" value={m.monthsWithData ? man(m.planForecast) : '—'} sub={m.monthsWithData ? '目標の ' + pct(m.planForecastVsTarget) : 'データがたまると出ます'} tone={forecastTone} big />
        </div>
        {m.monthsWithData > 0 && (
          <div className={'mt-4 rounded-2xl p-4 text-sm ' + (forecastTone === 'green' ? 'bg-emerald-50 text-emerald-800' : forecastTone === 'amber' ? 'bg-amber-50 text-amber-800' : 'bg-rose-50 text-rose-800')}>
            {forecastTone === 'green'
              ? <>🎉 いいペースです！このまま続けると <b>{man(m.planForecast)}</b> で、目標を超えられそう。</>
              : forecastTone === 'amber'
              ? <>あと少し。今のペースだと <b>{man(m.planForecast)}</b>。目標まで月あと <b>{man(Math.max(0, (m.planAnnualTarget - m.planForecast) / 12))}</b> 増やせると届きます。</>
              : <>今のペースだと <b>{man(m.planForecast)}</b> で目標に届きません。1日の客数や単価を少し見直してみましょう。</>}
          </div>
        )}
      </Card>

      {/* 目標のかんたん設定 */}
      <Card className="p-5">
        <h3 className="font-bold text-stone-600 mb-2">目標をまとめて決める</h3>
        <p className="text-sm text-stone-400 mb-3">1年の目標額を入れて「12ヶ月に分ける」を押すと、毎月へ均等に割り振ります。あとから月ごとに微調整できます。</p>
        <div className="flex flex-wrap gap-2 items-center">
          <div className="flex items-center rounded-2xl border-2 border-stone-100 bg-stone-50 overflow-hidden">
            <span className="pl-3 text-stone-300 font-bold">¥</span>
            <NumInput value={annualInput} placeholder={String(m.planAnnualTarget)}
              onChange={(v) => setAnnualInput(v ? String(v) : '')}
              className="w-40 px-2 py-2.5 outline-none tabnum text-right bg-transparent" />
          </div>
          <button onClick={splitEven} className="bg-rose-400 hover:bg-rose-500 text-white px-4 py-2.5 rounded-2xl font-bold text-sm">12ヶ月に分ける</button>
        </div>
      </Card>

      {/* 月ごとの目標と実績 */}
      <Card className="p-5">
        <h3 className="font-bold text-stone-600 mb-1">毎月の目標</h3>
        <p className="text-sm text-stone-400 mb-4">青いバーが目標、ピンクが実際の売上（税込）。繁忙期は <b>＋</b>、ひまな月は <b>−</b> で5万円ずつ調整できます（金額を直接いれてもOK）。</p>
        <div className="space-y-3">
          {m.planRows.map((r, i) => {
            const reached = r.target && r.actual >= r.target;
            const stepMonth = (d) => setMonth(i, Math.max(0, (r.target || 0) + d));
            return (
              <div key={i} className="flex items-center gap-2">
                <span className="w-9 text-sm font-bold text-stone-500 shrink-0">{MONTH_NAMES[i]}</span>
                <div className="flex-1 min-w-0">
                  {/* 目標バー（背景）＋実績バー（前景） */}
                  <div className="relative h-7 bg-stone-100 rounded-full overflow-hidden">
                    <div className="absolute inset-y-0 left-0 bg-sky-100" style={{ width: (r.target / maxV * 100) + '%' }} />
                    <div className={'absolute inset-y-0 left-0 ' + (reached ? 'bg-emerald-400' : 'bg-rose-300')} style={{ width: (r.actual / maxV * 100) + '%' }} />
                    {r.actual > 0 && <span className="absolute inset-y-0 left-2 flex items-center text-xs font-bold text-white tabnum">{man(r.actual)}</span>}
                  </div>
                </div>
                <div className="flex items-stretch rounded-xl border-2 border-stone-100 bg-stone-50 overflow-hidden shrink-0">
                  <button type="button" onClick={() => stepMonth(-50000)}
                    className="px-2.5 bg-stone-100 text-stone-400 text-lg font-bold active:bg-stone-200 leading-none">−</button>
                  <NumInput value={r.target} onChange={(v) => setMonth(i, v)}
                    className="w-20 px-1 py-1.5 outline-none tabnum text-right text-sm bg-transparent" />
                  <button type="button" onClick={() => stepMonth(50000)}
                    className="px-2.5 bg-stone-100 text-rose-300 text-lg font-bold active:bg-stone-200 leading-none">＋</button>
                </div>
                <span className="w-10 text-right text-xs font-bold tabnum shrink-0">
                  {r.target ? <span className={reached ? 'text-emerald-500' : 'text-stone-400'}>{Math.round(r.rate * 100)}%</span> : '—'}
                </span>
              </div>
            );
          })}
        </div>
        <div className="mt-4 flex items-center gap-2 text-xs text-stone-400">
          <span className="inline-block w-3 h-3 rounded-full bg-sky-100" /> 目標
          <span className="inline-block w-3 h-3 rounded-full bg-rose-300 ml-2" /> 実際の売上
          <span className="inline-block w-3 h-3 rounded-full bg-emerald-400 ml-2" /> 目標達成
        </div>
      </Card>
    </div>
  );
}

/* ============================================================
   ★ 招待コード（参入障壁・かんたんアクセス制限）
   ──────────────────────────────────────────────
   ・配る相手に code を伝える。enabled:false か code:'' でゲート無効
   ・注意：クライアント側のため "知らない人を弾く" 程度の気休め。
     本気で守るならホスティング側（Cloudflare Access 等）でロックする
   ============================================================ */
const ACCESS_CONFIG = {
  enabled: true,
  code: 'saloneko',   // ← 招待コード
};

/* ============================================================
   招待コードゲート
   ============================================================ */
function Gate({ onPass }) {
  const [code, setCode] = useState('');
  const [err, setErr] = useState(false);
  const submit = () => {
    if (code.trim().toLowerCase() === ACCESS_CONFIG.code.toLowerCase()) {
      try { localStorage.setItem('saloneko-access', 'ok'); } catch (e) {}
      onPass();
    } else { setErr(true); }
  };
  return (
    <div className="min-h-screen bg-cream flex items-center justify-center p-6">
      <Card className="p-8 max-w-sm w-full text-center">
        <div className="inline-block"><Mascot type="cat" size={92} mood="think" /></div>
        <h1 className="text-2xl font-extrabold text-stone-700 mt-3">サロねこ</h1>
        <p className="text-sm text-stone-400 mt-2 mb-5">招待された方だけのテスト版だにゃ。<br />あいことば（招待コード）を入れてね</p>
        <input value={code} onChange={(e) => { setCode(e.target.value); setErr(false); }}
          onKeyDown={(e) => e.key === 'Enter' && submit()} placeholder="招待コード"
          className={'w-full text-center text-lg tabnum border-2 rounded-2xl px-4 py-3 outline-none bg-stone-50 ' + (err ? 'border-rose-300' : 'border-stone-100 focus:border-rose-300')} />
        {err && <div className="text-rose-500 text-sm mt-2">コードが違うみたい…もう一度にゃ</div>}
        <button onClick={submit} className="mt-4 w-full py-3.5 rounded-2xl font-extrabold text-white bg-rose-400 hover:bg-rose-500 transition-colors">入る</button>
        <p className="text-[11px] text-stone-400 mt-4 leading-relaxed">🔒 入力したお金の情報は<b>この端末の中だけ</b>に保存され、外部に送信・公開されません。</p>
      </Card>
    </div>
  );
}
