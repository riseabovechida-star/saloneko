function App() {
  const [s, setS] = useState(() => {
    try {
      const saved = localStorage.getItem('salon-finance-v1');
      if (saved) return { ...DEFAULT_STATE, ...JSON.parse(saved) };
    } catch (e) {}
    return DEFAULT_STATE;
  });
  const [gateOk, setGateOk] = useState(() => {
    if (!ACCESS_CONFIG.enabled || !ACCESS_CONFIG.code) return true;
    try { return localStorage.getItem('saloneko-access') === 'ok'; } catch (e) { return false; }
  });
  const [onboarded, setOnboarded] = useState(() => {
    try { return localStorage.getItem('saloneko-onboarded') === '1'; } catch (e) { return false; }
  });
  const [showIntro, setShowIntro] = useState(false);
  const [showPrivacy, setShowPrivacy] = useState(false);
  const toTop = () => { try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch (e) {} };
  const openIntro = () => { setShowIntro(true); toTop(); };
  const openPrivacy = () => { setShowPrivacy(true); toTop(); };
  const startApp = () => {
    try { localStorage.setItem('saloneko-onboarded', '1'); } catch (e) {}
    setOnboarded(true); setShowIntro(false); toTop();
  };
  const [tab, setTab] = useState('dash');
  const [visited, setVisited] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('saloneko-visited') || '[]')); } catch (e) { return new Set(); }
  });
  // タブの横スクロール促し：右にまだ続きがある間だけ矢印を出す（端まで行くと消える）
  const tabScrollRef = useRef(null);
  const [tabMore, setTabMore] = useState(false);
  const checkTabScroll = () => {
    const el = tabScrollRef.current;
    if (!el) return;
    setTabMore(el.scrollLeft + el.clientWidth < el.scrollWidth - 4);
  };
  useEffect(() => {
    const t = setTimeout(checkTabScroll, 50);
    window.addEventListener('resize', checkTabScroll);
    return () => { clearTimeout(t); window.removeEventListener('resize', checkTabScroll); };
  }, [onboarded, showIntro, gateOk]);
  const goTab = (id) => {
    setTab(id);
    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });
    setVisited((prev) => {
      if (prev.has(id)) return prev;
      const next = new Set(prev); next.add(id);
      try { localStorage.setItem('saloneko-visited', JSON.stringify([...next])); } catch (e) {}
      return next;
    });
  };
  const m = useMemo(() => compute(s), [s]);

  useEffect(() => {
    try { localStorage.setItem('salon-finance-v1', JSON.stringify(s)); } catch (e) {}
  }, [s]);

  const reset = () => {
    if (!confirm('入力をすべて初期値に戻します。よろしいですか？')) return;
    setS(JSON.parse(JSON.stringify(DEFAULT_STATE)));
    try {
      localStorage.removeItem('saloneko-onboarded');
      localStorage.removeItem('saloneko-visited');
    } catch (e) {}
    setVisited(new Set());
    setOnboarded(false);
    setShowIntro(true);
    setTab('dash');
  };

  if (!gateOk) return <Gate onPass={() => setGateOk(true)} />;
  if (!onboarded || showIntro) return <Intro mascotType={s.settings.mascotType} onStart={startApp} />;

  return (
    <div className="min-h-screen pb-12">
      <header className="bg-gradient-to-br from-rose-300 via-rose-200 to-amber-200 text-stone-700">
        <div className="max-w-5xl mx-auto px-4 pt-6 pb-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-2xl bg-white/80 shadow-soft flex items-center justify-center p-1"><Mascot type={s.settings.mascotType} size={40} mood="happy" /></div>
            <div>
              <h1 className="text-xl font-extrabold">サロねこ</h1>
              <p className="text-stone-500 text-sm">お店のお金、いっしょに見るにゃ</p>
            </div>
          </div>
          <button onClick={reset} className="text-xs bg-white/60 hover:bg-white/90 text-stone-500 px-3 py-2 rounded-full transition-colors shadow-soft">初期値に戻す</button>
        </div>
        <div className="max-w-5xl mx-auto px-4 pb-4">
          <div className="relative">
            <div ref={tabScrollRef} onScroll={checkTabScroll}
              className="flex gap-1.5 overflow-x-auto pb-1 no-scrollbar">
              {TABS.map((t) => (
                <button key={t.id} onClick={() => goTab(t.id)}
                  className={'px-4 py-2.5 text-sm font-bold rounded-full whitespace-nowrap transition-all ' +
                    (tab === t.id ? 'bg-white text-rose-400 shadow-soft scale-105' : 'text-stone-500 hover:bg-white/40')}>
                  <span className="mr-1">{t.icon}</span>{t.label}
                </button>
              ))}
            </div>
            {tabMore && (
              <div className="pointer-events-none absolute top-0 right-0 bottom-1 flex items-center">
                <div className="h-full w-12 bg-gradient-to-l from-rose-200 to-transparent" />
                <div className="absolute right-1 w-7 h-7 flex items-center justify-center bg-white text-rose-500 text-base font-bold rounded-full shadow-soft nudge">
                  →
                </div>
              </div>
            )}
          </div>
        </div>
      </header>

      {tab !== 'dash' && (
        <div className="max-w-5xl mx-auto px-4 pt-4">
          <button onClick={() => goTab('dash')}
            className="inline-flex items-center gap-1.5 text-sm font-bold text-stone-500 bg-white hover:bg-peach border border-stone-200 rounded-full px-4 py-2 shadow-soft transition-colors">
            <span className="text-base leading-none">←</span> ホーム（はじめの4ステップ）へもどる
          </button>
        </div>
      )}

      <main key={tab} className="max-w-5xl mx-auto px-4 pt-5 fadein">
        <TabHint type={s.settings.mascotType} tab={tab} />
        {tab === 'dash' && <Dashboard s={s} setS={setS} m={m} visited={visited} goTab={goTab} />}
        {tab === 'sales' && <SalesTab s={s} setS={setS} m={m} />}
        {tab === 'plan' && <PlanTab s={s} setS={setS} m={m} />}
        {tab === 'cost' && <CostTab s={s} setS={setS} m={m} />}
        {tab === 'living' && <LivingTab s={s} setS={setS} m={m} />}
        {tab === 'receipt' && <ReceiptTab s={s} setS={setS} m={m} />}
        {tab === 'monthly' && <MonthlyTab s={s} m={m} />}
        {tab === 'tax' && <TaxTab s={s} setS={setS} m={m} />}
        {tab === 'expand' && <ExpansionTab s={s} setS={setS} m={m} />}
        {tab === 'loan' && <LoanTab s={s} setS={setS} m={m} />}
      </main>

      <footer className="max-w-5xl mx-auto px-4 mt-8 text-center text-xs text-stone-300 space-y-2">
        <div className="flex items-center justify-center gap-4">
          <button onClick={openIntro} className="text-rose-300 hover:text-rose-400 font-bold">🐾 サロねこって？</button>
          <button onClick={openPrivacy} className="text-rose-300 hover:text-rose-400 font-bold">🔒 プライバシー・データの扱い</button>
        </div>
        <div>入力内容はこの端末（ブラウザ）内だけに保存され、外部に送信・公開されません。数値は目安計算であり、実際の融資・税務は専門家にご相談ください。</div>
      </footer>
      {showPrivacy && <Privacy onClose={() => setShowPrivacy(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
